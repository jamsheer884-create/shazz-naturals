<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Shazz Natural's</title>
  <link rel="stylesheet" href="/css/admin.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes orbDrift1 {
      0%,100% { transform: translate(0px, 0px) scale(1); }
      25%      { transform: translate(40px, -30px) scale(1.08); }
      50%      { transform: translate(-20px, 50px) scale(0.95); }
      75%      { transform: translate(30px, 20px) scale(1.05); }
    }
    @keyframes orbDrift2 {
      0%,100% { transform: translate(0px, 0px) scale(1); }
      30%      { transform: translate(-50px, 40px) scale(1.1); }
      60%      { transform: translate(30px, -60px) scale(0.9); }
    }
    @keyframes orbDrift3 {
      0%,100% { transform: translate(0px, 0px) scale(1); }
      40%      { transform: translate(60px, 30px) scale(1.12); }
      80%      { transform: translate(-40px, -20px) scale(0.92); }
    }
    @keyframes orbDrift4 {
      0%,100% { transform: translate(0px, 0px) scale(1); }
      35%      { transform: translate(-30px, -50px) scale(1.06); }
      70%      { transform: translate(50px, 40px) scale(0.94); }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes logoFloat {
      0%,100% { transform: translateY(0px); filter: drop-shadow(0 8px 24px rgba(76,175,80,0.35)); }
      50%      { transform: translateY(-10px); filter: drop-shadow(0 18px 36px rgba(76,175,80,0.55)); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    body { min-height: 100vh; }

    .adm-login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #071a07 0%, #0d3319 40%, #0f4020 70%, #071a07 100%);
      position: relative;
      overflow: hidden;
    }

    /* Large blurred orbs like TrueBooks style */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .orb-1 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(56,142,60,0.35) 0%, rgba(27,94,32,0.1) 70%, transparent 100%);
      top: -80px; left: -80px;
      animation: orbDrift1 14s ease-in-out infinite;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(76,175,80,0.22) 0%, rgba(46,125,50,0.08) 70%, transparent 100%);
      bottom: -120px; right: -100px;
      animation: orbDrift2 18s ease-in-out infinite;
    }
    .orb-3 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(139,195,74,0.20) 0%, rgba(104,159,56,0.06) 70%, transparent 100%);
      top: 50%; left: -60px;
      transform: translateY(-50%);
      animation: orbDrift3 22s ease-in-out infinite;
    }
    .orb-4 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(56,142,60,0.25) 0%, rgba(27,94,32,0.08) 70%, transparent 100%);
      top: 20%; right: -80px;
      animation: orbDrift4 16s ease-in-out infinite;
    }
    .orb-5 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(174,213,129,0.15) 0%, transparent 70%);
      bottom: 15%; left: 20%;
      animation: orbDrift1 20s ease-in-out infinite reverse;
    }

    /* Card */
    .adm-login-card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.96);
      border-radius: 24px;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.4),
        0 0 0 1px rgba(255,255,255,0.08),
        inset 0 1px 0 rgba(255,255,255,0.9);
      padding: 44px 44px 36px;
      width: 100%;
      max-width: 440px;
      animation: cardIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Logo */
    .adm-login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .adm-login-logo img {
      height: 150px;
      width: 100%;
      max-width: 300px;
      object-fit: contain;
      display: block;
      margin: 0 auto 12px;
      animation: logoFloat 3.5s ease-in-out infinite;
    }
    .adm-login-logo h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0a2f0a;
      margin-bottom: 4px;
    }
    .adm-login-logo p {
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Divider */
    .login-divider {
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 20px;
    }

    /* Sign In button shimmer */
    .adm-btn-primary {
      position: relative;
      overflow: hidden;
    }
    .adm-btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      background-size: 200% 100%;
      animation: shimmer 2.5s linear infinite;
    }

    /* Footer text */
    .login-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 0.78rem;
      color: #aaa;
      letter-spacing: 0.04em;
    }
    .login-footer a { color: #2e7d32; font-weight: 600; text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }

    @media (max-width: 500px) {
      .adm-login-card { padding: 32px 24px 28px; margin: 16px; }
      .adm-login-logo img { height: 120px; }
      .orb-1 { width: 260px; height: 260px; }
      .orb-2 { width: 300px; height: 300px; }
    }
  </style>
</head>
<body>
<div class="adm-login-page">
  <!-- Background orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>
  <div class="orb orb-5"></div>

  <div class="adm-login-card">
    <div class="adm-login-logo">
      <img src="/images/shazz-logo.png" alt="Shazz Natural's"/>
      <h2>Shazz Natural's</h2>
      <p>Admin Control Panel</p>
    </div>
    <div class="login-divider">Sign in to continue</div>
    <div id="alert"></div>
    <div class="adm-form-group">
      <label>Admin Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username"/>
    </div>
    <div class="adm-form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
    </div>
    <button onclick="doLogin()" class="adm-btn adm-btn-primary adm-btn-lg" style="width:100%;justify-content:center;margin-top:8px" id="login-btn">
      Sign In
    </button>
    <div class="login-footer">
      <a href="/">← Back to Website</a>
    </div>
  </div>
</div>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const me = await fetch('/api/auth/me').then(r => r.json());
    if (me.user?.role === 'admin') window.location.href = '/admin/dashboard.html';
    document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  });

  async function doLogin() {
    const btn = document.getElementById('login-btn');
    const alertEl = document.getElementById('alert');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { alertEl.innerHTML = '<div class="adm-alert adm-alert-error">Please enter username and password.</div>'; return; }
    btn.innerHTML = '<span class="adm-spinner"></span> Signing in...';
    btn.disabled = true;
    const res = await fetch('/api/auth/admin-login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/admin/dashboard.html';
    } else {
      alertEl.innerHTML = '<div class="adm-alert adm-alert-error">❌ ' + (data.error || 'Invalid credentials') + '</div>';
      btn.innerHTML = 'Sign In';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
