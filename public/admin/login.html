<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Shazz Natural's</title>
  <link rel="stylesheet" href="/css/admin.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes logoFloat {
      0%,100% { transform: translateY(0px); filter: drop-shadow(0 8px 24px rgba(76,175,80,0.35)); }
      50%      { transform: translateY(-10px); filter: drop-shadow(0 18px 36px rgba(76,175,80,0.55)); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes treeWave {
      0%,100% { transform: rotate(0deg); transform-origin: bottom center; }
      50%      { transform: rotate(2deg); transform-origin: bottom center; }
    }
    @keyframes treeWave2 {
      0%,100% { transform: rotate(0deg); transform-origin: bottom center; }
      50%      { transform: rotate(-2.5deg); transform-origin: bottom center; }
    }
    @keyframes ripple {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    body { min-height: 100vh; }

    .adm-login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 20% 50%, #0a2e0a 0%, #071a07 40%, #050f05 100%);
      position: relative;
      overflow: hidden;
    }

    /* Canvas for particles */
    #bg-canvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* Bottom Kerala landscape */
    .kerala-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 220px;
      z-index: 2;
      pointer-events: none;
    }

    /* Water ripple at base */
    .water-strip {
      position: absolute;
      bottom: 0; left: 0;
      width: 200%; height: 38px;
      background: repeating-linear-gradient(90deg,
        rgba(13,51,26,0.0) 0%, rgba(30,100,50,0.18) 10%,
        rgba(13,51,26,0.0) 20%);
      animation: ripple 8s linear infinite;
      z-index: 3;
    }

    /* Subtle golden top glow */
    .top-glow {
      position: absolute;
      top: -60px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 200px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* Card */
    .adm-login-card {
      position: relative;
      z-index: 10;  /* above canvas(1) and kerala(2) */
      background: rgba(255,255,255,0.96);
      border-radius: 24px;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.4),
        0 0 0 1px rgba(255,255,255,0.08),
        inset 0 1px 0 rgba(255,255,255,0.9);
      padding: 44px 44px 36px;
      width: 100%;
      max-width: 440px;
      animation: cardIn 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Logo */
    .adm-login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .adm-login-logo img {
      height: 150px;
      width: 100%;
      max-width: 300px;
      object-fit: contain;
      display: block;
      margin: 0 auto 12px;
      animation: logoFloat 3.5s ease-in-out infinite;
    }
    .adm-login-logo h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0a2f0a;
      margin-bottom: 4px;
    }
    .adm-login-logo p {
      font-size: 0.8rem;
      color: #888;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Divider */
    .login-divider {
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 20px;
    }

    /* Sign In button shimmer */
    .adm-btn-primary {
      position: relative;
      overflow: hidden;
    }
    .adm-btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      background-size: 200% 100%;
      animation: shimmer 2.5s linear infinite;
    }

    /* Footer text */
    .login-footer {
      text-align: center;
      margin-top: 22px;
      font-size: 0.78rem;
      color: #aaa;
      letter-spacing: 0.04em;
    }
    .login-footer a { color: #2e7d32; font-weight: 600; text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }

    @media (max-width: 500px) {
      .adm-login-card { padding: 32px 24px 28px; margin: 16px; }
      .adm-login-logo img { height: 120px; }
      .orb-1 { width: 260px; height: 260px; }
      .orb-2 { width: 300px; height: 300px; }
    }
  </style>
</head>
<body>
<div class="adm-login-page">
  <div class="top-glow"></div>
  <canvas id="bg-canvas"></canvas>

  <!-- Kerala bottom landscape -->
  <div class="kerala-bottom">
    <svg viewBox="0 0 1440 220" xmlns="http://www.w3.org/2000/svg" style="position:absolute;bottom:0;left:0;width:100%;height:100%">
      <!-- Background hills -->
      <path d="M0,175 Q240,125 480,162 Q720,198 960,145 Q1200,95 1440,155 L1440,220 L0,220Z" fill="rgba(8,28,10,0.72)"/>
      <path d="M0,198 Q360,168 720,183 Q1080,198 1440,193 L1440,220 L0,220Z" fill="rgba(5,15,7,0.9)"/>

      <!-- LEFT PALM TREE — crown at (100,38), base at (108,218) -->
      <g style="transform-origin:108px 218px;animation:treeWave 4.5s ease-in-out infinite">
        <!-- Tapered curved trunk -->
        <path d="M104,218 C100,182 97,148 96,112 C95,78 95,58 97,38 L103,38 C105,58 105,78 106,112 C107,148 110,182 112,218Z" fill="#0b2210"/>
        <!-- Crown cluster -->
        <circle cx="100" cy="38" r="7" fill="#163a16"/>
        <!-- Frond 1: upper-left long drooping -->
        <path d="M100,38 C78,14 48,0 13,2 C42,16 72,30 100,38Z" fill="#1a4a1c"/>
        <!-- Frond 2: top vertical -->
        <path d="M100,38 C107,18 106,-5 97,-22 C90,-5 91,18 100,38Z" fill="#1a4a1c"/>
        <!-- Frond 3: upper-right long drooping -->
        <path d="M100,38 C122,14 152,0 180,2 C152,16 122,30 100,38Z" fill="#1a4a1c"/>
        <!-- Frond 4: left side drooping down -->
        <path d="M100,38 C73,48 43,55 17,70 C43,52 73,44 100,38Z" fill="#1a4a1c"/>
        <!-- Frond 5: right side drooping down -->
        <path d="M100,38 C127,48 157,55 183,70 C157,52 127,44 100,38Z" fill="#1a4a1c"/>
        <!-- Frond 6: lower-left hanging -->
        <path d="M100,38 C85,58 69,80 57,102 C69,78 85,56 100,38Z" fill="#1a4a1c"/>
        <!-- Frond 7: lower-right hanging -->
        <path d="M100,38 C115,58 131,80 143,102 C131,78 115,56 100,38Z" fill="#1a4a1c"/>
        <!-- Frond 8: upper-left 2 -->
        <path d="M100,38 C83,22 63,5 45,-10 C63,8 83,24 100,38Z" fill="#1a4a1c"/>
      </g>

      <!-- RIGHT PALM TREE — crown at (1340,38), base at (1332,218) -->
      <g style="transform-origin:1332px 218px;animation:treeWave2 5.5s ease-in-out infinite">
        <!-- Trunk -->
        <path d="M1328,218 C1332,182 1335,148 1336,112 C1337,78 1337,58 1338,38 L1344,38 C1345,58 1345,78 1346,112 C1347,148 1348,182 1352,218Z" fill="#0b2210"/>
        <circle cx="1341" cy="38" r="7" fill="#163a16"/>
        <!-- Fronds mirrored -->
        <path d="M1341,38 C1363,14 1393,0 1428,2 C1399,16 1369,30 1341,38Z" fill="#1a4a1c"/>
        <path d="M1341,38 C1334,18 1335,-5 1344,-22 C1351,-5 1350,18 1341,38Z" fill="#1a4a1c"/>
        <path d="M1341,38 C1319,14 1289,0 1261,2 C1289,16 1319,30 1341,38Z" fill="#1a4a1c"/>
        <path d="M1341,38 C1368,48 1398,55 1424,70 C1398,52 1368,44 1341,38Z" fill="#1a4a1c"/>
        <path d="M1341,38 C1314,48 1284,55 1258,70 C1284,52 1314,44 1341,38Z" fill="#1a4a1c"/>
        <path d="M1341,38 C1356,58 1372,80 1384,102 C1372,78 1356,56 1341,38Z" fill="#1a4a1c"/>
        <path d="M1341,38 C1326,58 1310,80 1298,102 C1310,78 1326,56 1341,38Z" fill="#1a4a1c"/>
        <path d="M1341,38 C1358,22 1378,5 1396,-10 C1378,8 1358,24 1341,38Z" fill="#1a4a1c"/>
      </g>
    </svg>
    <div class="water-strip"></div>
  </div>

  <div class="adm-login-card">
    <div class="adm-login-logo">
      <img src="/images/shazz-logo.png" alt="Shazz Natural's"/>
      <h2>Shazz Natural's</h2>
      <p>Admin Control Panel</p>
    </div>
    <div class="login-divider">Sign in to continue</div>
    <div id="alert"></div>
    <div class="adm-form-group">
      <label>Admin Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username"/>
    </div>
    <div class="adm-form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
    </div>
    <button onclick="doLogin()" class="adm-btn adm-btn-primary adm-btn-lg" style="width:100%;justify-content:center;margin-top:8px" id="login-btn">
      Sign In
    </button>
    <div class="login-footer">
      <a href="/">← Back to Website</a>
    </div>
  </div>
</div>
<script>
  /* ── Kerala background canvas: floating leaves + gold sparkles ── */
  (function() {
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    const LEAF_COLORS = ['#2e7d32','#388e3c','#43a047','#66bb6a','#81c784','#a5d6a7'];
    const GOLD_COLORS = ['#c9a84c','#d4ac0d','#ffd54f','#ffca28','#ffe082'];

    class Leaf {
      constructor(initial) {
        this.x = Math.random() * canvas.width;
        this.y = initial ? Math.random() * canvas.height : canvas.height + 20;
        this.size = 7 + Math.random() * 14;
        this.vy = -(0.25 + Math.random() * 0.5);
        this.vx = (Math.random() - 0.5) * 0.3;
        this.rot = Math.random() * Math.PI * 2;
        this.rotV = (Math.random() - 0.5) * 0.018;
        this.alpha = 0.12 + Math.random() * 0.28;
        this.color = LEAF_COLORS[Math.floor(Math.random() * LEAF_COLORS.length)];
        this.sw = Math.random() * Math.PI * 2;
        this.swS = 0.007 + Math.random() * 0.01;
        this.swA = 0.4 + Math.random() * 1.2;
      }
      update() {
        this.sw += this.swS;
        this.x += Math.sin(this.sw) * this.swA + this.vx;
        this.y += this.vy;
        this.rot += this.rotV;
        if (this.y < -30) { this.x = Math.random() * canvas.width; this.y = canvas.height + 20; }
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.moveTo(0, -this.size);
        ctx.bezierCurveTo(this.size*0.7,-this.size*0.4, this.size*0.7,this.size*0.4, 0, this.size);
        ctx.bezierCurveTo(-this.size*0.7,this.size*0.4, -this.size*0.7,-this.size*0.4, 0, -this.size);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 0.6;
        ctx.beginPath(); ctx.moveTo(0,-this.size); ctx.lineTo(0,this.size); ctx.stroke();
        ctx.restore();
      }
    }

    class Sparkle {
      constructor(initial) {
        this.x = Math.random() * canvas.width;
        this.y = initial ? Math.random() * canvas.height : canvas.height + 10;
        this.size = 1.5 + Math.random() * 2.5;
        this.vy = -(0.15 + Math.random() * 0.4);
        this.vx = (Math.random() - 0.5) * 0.25;
        this.life = 0;
        this.maxLife = 120 + Math.random() * 180;
        this.alpha = 0;
        this.maxAlpha = 0.5 + Math.random() * 0.5;
        this.color = GOLD_COLORS[Math.floor(Math.random() * GOLD_COLORS.length)];
        this.pulse = Math.random() * Math.PI * 2;
        this.pulseS = 0.04 + Math.random() * 0.06;
      }
      update() {
        this.life++; this.pulse += this.pulseS;
        this.x += this.vx; this.y += this.vy;
        const t = this.life / this.maxLife;
        if (t < 0.25) this.alpha = (t / 0.25) * this.maxAlpha;
        else if (t > 0.65) this.alpha = ((1 - t) / 0.35) * this.maxAlpha;
        else this.alpha = this.maxAlpha * (0.75 + 0.25 * Math.sin(this.pulse));
        if (this.life >= this.maxLife || this.y < -10) {
          this.x = Math.random() * canvas.width; this.y = canvas.height + 10;
          this.life = 0; this.alpha = 0;
        }
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha * 0.35;
        const g = ctx.createRadialGradient(this.x,this.y,0, this.x,this.y,this.size*5);
        g.addColorStop(0, this.color); g.addColorStop(1,'transparent');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(this.x,this.y,this.size*5,0,Math.PI*2); ctx.fill();
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(this.x,this.y,this.size*0.6,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    const particles = [];
    for (let i = 0; i < 22; i++) particles.push(new Leaf(true));
    for (let i = 0; i < 35; i++) particles.push(new Sparkle(true));

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  })();

  document.addEventListener('DOMContentLoaded', async () => {
    const me = await fetch('/api/auth/me').then(r => r.json());
    if (me.user?.role === 'admin') window.location.href = '/admin/dashboard.html';
    document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  });

  async function doLogin() {
    const btn = document.getElementById('login-btn');
    const alertEl = document.getElementById('alert');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { alertEl.innerHTML = '<div class="adm-alert adm-alert-error">Please enter username and password.</div>'; return; }
    btn.innerHTML = '<span class="adm-spinner"></span> Signing in...';
    btn.disabled = true;
    const res = await fetch('/api/auth/admin-login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (data.success) {
      window.location.href = '/admin/dashboard.html';
    } else {
      alertEl.innerHTML = '<div class="adm-alert adm-alert-error">❌ ' + (data.error || 'Invalid credentials') + '</div>';
      btn.innerHTML = 'Sign In';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
